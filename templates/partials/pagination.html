{% if page_obj.has_other_pages %}
    <nav class="pagination" aria-label="Paginacao">
        {% if page_obj.has_previous %}
            <a href="?{% if extra_query %}{{ extra_query }}&{% endif %}page={{ page_obj.previous_page_number }}">Anterior</a>
        {% endif %}
        <span>Pagina {{ page_obj.number }} de {{ page_obj.paginator.num_pages }}</span>
        {% if page_obj.has_next %}
            <a href="?{% if extra_query %}{{ extra_query }}&{% endif %}page={{ page_obj.next_page_number }}">Proxima</a>
        {% endif %}
    </nav>
{% endif %}
