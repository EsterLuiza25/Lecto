<article class="text-card">
    <div class="text-card__visual">
        <img src="{% url 'reading:text_artwork' text.slug %}" alt="" loading="lazy" decoding="async" onerror="this.closest('.text-card__visual').classList.add('is-image-missing'); this.remove();">
        <span class="text-card__fallback">{{ text.level.name }}</span>
    </div>
    <div class="text-card__body">
        <div class="meta-row">
            <span>{{ text.level.name }}</span>
            <span>{{ text.category.name }}</span>
        </div>
        <h3>{{ text.title }}</h3>
        <p>{{ text.summary_pt }}</p>
        <div class="text-card__footer">
            <span>{{ text.estimated_reading_time }} min</span>
            <span>{{ text.word_count }} palavras</span>
            <a href="{{ text.get_absolute_url }}">Ler</a>
        </div>
    </div>
</article>
