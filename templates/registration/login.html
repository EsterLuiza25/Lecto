{% extends "base.html" %}

{% block title %}Entrar - Lecto{% endblock %}

{% block content %}
<section class="auth-panel">
    <h1>Entrar</h1>
    <p>Acesse sua conta para ler textos completos, salvar favoritos e acumular moedinhas.</p>
    <form method="post" class="stack-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="button primary" type="submit">Entrar</button>
    </form>
    <p class="form-note">Ainda nao tem conta? <a href="{% url 'signup' %}">Cadastre-se</a>.</p>
</section>
{% endblock %}
